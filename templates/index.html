<!DOCTYPE html>
<html>
<head>
    <title>Fake Job Offer Detector</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h1 class="text-center text-danger">
             🛡️ Fake Job Offer Detector
        </h1>

        <p class="text-center text-muted">
            Detect suspicious internship and job offers
        </p>

        <form action="/check" method="POST">
	    <div class="mb-3">

	    <label class="form-label">

	    Recruiter Email

	    </label>

	    <input
	    type="email"
	    class="form-control"
	    name="email"
	    placeholder="Example: hr@ibm.com">

	    </div>

            <textarea
            class="form-control"
            name="jobtext"
            rows="10"
            placeholder="Paste Job Offer Message Here"></textarea>

            <br>

            <button
            class="btn btn-danger w-100"
            type="submit">

            Analyze Offer

            </button>

        </form>
	<hr>

	<p class="text-center text-muted">
    		© 2026 Fake Job Offer Detector | Developed by Deepak Varude
	</p>


    </div>

</div>

</body>
</html>
